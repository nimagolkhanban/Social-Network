{% extends "base.html" %}
{% block content %}
    <h3 class="text-center">{{ user.username }}</h3>
<div class="card col-md-5 centered">
    {% for post in posts%}
        <a class="card-body" href="{{ post.get_absolute_url }}">{{ post.body|truncatewords:50 }}</a>
    {% endfor %}
</div>
{% endblock %}
